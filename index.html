      background: var(--gray-50);
      padding: 1.2rem 1.6rem;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .tarif-card-header h3 {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--dark);
    }
    .tarif-card-body { padding: .5rem 0; }
    .tarif-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .85rem 1.6rem;
      font-size: .9rem;
      transition: background .15s;
    }
    .tarif-row:hover { background: var(--gray-50); }
    .tarif-row + .tarif-row { border-top: 1px solid var(--gray-100); }
    .tarif-label { color: var(--gray-700); }
    .tarif-price {
      font-weight: 700;
      color: var(--dark);
      white-space: nowrap;
    }
    .tarif-price.orange { color: var(--orange); }
    .tarif-note {
      padding: .75rem 1.6rem;
      font-size: .8rem;
      color: var(--gray-500);
      font-style: italic;
      background: var(--orange-pale);
      border-top: 1px solid var(--gray-200);
    }

    /* ═══════════════════════════════════════════
       GALLERY
     ═══════════════════════════════════════════ */
    .gallery { padding: 4rem 0; background: var(--gray-900); }
    .gallery .section-title { color: var(--white); }
    .gallery .section-subtitle { color: rgba(255,255,255,.6); }
    .gallery-header { margin-bottom: 2.5rem; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: .6rem;
    }
    .gallery-item {
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 8px;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .4s ease, filter .3s ease;
      filter: brightness(.85);
    }
    .gallery-item:hover img {
      transform: scale(1.07);
      filter: brightness(1);
    }
    .gallery-item.large { grid-column: span 2; aspect-ratio: 2/1; }

    /* ═══════════════════════════════════════════
       TÉMOIGNAGES
     ═══════════════════════════════════════════ */
    .temoignages { padding: 5rem 0; background: var(--gray-50); }
    .temoignages-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-top: 3rem;
    }
    .temoignage-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 1.8rem;
      position: relative;
    }
    .stars {
      color: #F59E0B;
      font-size: 1rem;
      letter-spacing: .1rem;
      margin-bottom: 1rem;
    }
    .temoignage-text {
      font-size: .95rem;
      color: var(--gray-700);
      line-height: 1.7;
      margin-bottom: 1.2rem;
      font-style: italic;
    }
    .temoignage-author {
      display: flex;
      align-items: center;
      gap: .8rem;
    }
    .author-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--orange-pale);
      color: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: .9rem;
      flex-shrink: 0;
    }
    .author-name {
      font-weight: 600;
      font-size: .9rem;
      color: var(--dark);
    }
    .author-source {
      font-size: .78rem;
      color: var(--gray-500);
    }
    .temoignages-cta {
      text-align: center;
      margin-top: 2.5rem;
    }

    /* ═══════════════════════════════════════════
       À PROPOS / QUI SUIS-JE
     ═══════════════════════════════════════════ */
    .about { padding: 5rem 0; }
    .about-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }
    .about-img-wrap {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 4/5;
    }
    .about-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .about-badge-float {
      position: absolute;
      bottom: 1.5rem;
      left: 1.5rem;
      background: var(--white);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: .8rem;
    }
    .about-badge-float .badge-num {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--orange);
    }
    .about-badge-float .badge-text {
      font-size: .8rem;
      color: var(--gray-700);
      font-weight: 500;
      line-height: 1.3;
    }
    .about-content .section-tag { margin-bottom: 1rem; }
    .about-content .section-title { margin-bottom: 1.2rem; }
    .about-content p {
      color: var(--gray-500);
      line-height: 1.8;
      margin-bottom: 1rem;
      font-size: .97rem;
    }
    .about-list {
      margin: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: .7rem;
    }
    .about-list li {
      display: flex;
      align-items: flex-start;
      gap: .7rem;
      font-size: .9rem;
      color: var(--gray-700);
    }
    .about-list li::before {
      content: '✓';
      width: 20px; height: 20px;
      background: var(--orange);
      color: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .7rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: .1rem;
    }

    /* ═══════════════════════════════════════════
       ZONES DESSERVIES
     ═══════════════════════════════════════════ */
    .zones { padding: 4rem 0; background: var(--navy); }
    .zones .section-title { color: var(--white); margin-bottom: 1rem; }
    .zones .section-subtitle { color: rgba(255,255,255,.6); margin-bottom: 2.5rem; }
    .zones-grid {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
    }
    .zone-tag {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.85);
      font-size: .85rem;
      padding: .4rem .9rem;
      border-radius: 100px;
      transition: all .2s;
    }
    .zone-tag:hover {
      background: rgba(29,110,245,.25);
      border-color: rgba(29,110,245,.5);
      color: var(--white);
    }
    .zone-tag.primary {
      background: var(--orange);
      border-color: var(--orange);
      color: var(--white);
      font-weight: 600;
    }
    /* SEO hidden text about zones */
    .zones-seo-text {
      margin-top: 2rem;
      font-size: .82rem;
      color: rgba(255,255,255,.35);
      line-height: 1.8;
    }

    /* ═══════════════════════════════════════════
       FAQ
     ═══════════════════════════════════════════ */
    .faq { padding: 5rem 0; }
    .faq-inner {
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      gap: 4rem;
      align-items: start;
    }
    .faq-aside .section-title { margin-bottom: 1rem; }
    .faq-aside p { color: var(--gray-500); line-height: 1.7; margin-bottom: 1.5rem; }
    .faq-contact-card {
      background: var(--orange-pale);
      border: 1px solid rgba(29,110,245,.2);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .faq-contact-card p { font-size: .9rem; color: var(--gray-700); margin-bottom: 1rem; }
    .faq-list { display: flex; flex-direction: column; gap: .6rem; }
    .faq-item {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .faq-q {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.2rem 1.4rem;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: .95rem;
      font-weight: 600;
      color: var(--dark);
      transition: background .15s;
    }
    .faq-q:hover { background: var(--gray-50); }
    .faq-icon {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: .8rem;
      color: var(--gray-700);
      transition: background .2s, transform .3s;
    }
    .faq-item.open .faq-icon {
      background: var(--orange);
      color: var(--white);
      transform: rotate(45deg);
    }
    .faq-a {
      max-height: 0;
      overflow: hidden;
      transition: max-height .35s ease, padding .3s;
    }
    .faq-item.open .faq-a { max-height: 300px; }
    .faq-a-inner {
      padding: 0 1.4rem 1.2rem;
      font-size: .9rem;
      color: var(--gray-500);
      line-height: 1.7;
      border-top: 1px solid var(--gray-100);
      padding-top: 1rem;
    }

    /* ═══════════════════════════════════════════
       CONTACT
     ═══════════════════════════════════════════ */
    .contact { padding: 5rem 0; background: var(--gray-50); }
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: start;
      margin-top: 3rem;
    }
    .contact-info h3 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 1.5rem;
    }
    .contact-details { display: flex; flex-direction: column; gap: 1.2rem; margin-bottom: 2rem; }
    .contact-detail {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }
    .contact-detail-icon {
      width: 44px; height: 44px;
      background: var(--orange-pale);
      color: var(--orange);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .contact-detail-text strong {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--gray-500);
      margin-bottom: .2rem;
    }
    .contact-detail-text span {
      font-size: .95rem;
      color: var(--dark);
      font-weight: 500;
    }
    .contact-btns { display: flex; flex-direction: column; gap: .7rem; }
    .contact-btns .btn { justify-content: center; text-align: center; }
    .map-embed {
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      height: 380px;
    }
    .map-embed iframe {
      width: 100%; height: 100%;
      border: none;
    }

    /* ═══════════════════════════════════════════
       FLOATING WHATSAPP
     ════════════════════ */
